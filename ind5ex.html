<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAFROT BOT</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
font-family:sans-serif;
display:flex;
align-items:center;
justify-content:center;
background:url("background.jpg") center/cover no-repeat;
}

.container{
background:rgba(0,0,0,0.55);
backdrop-filter:blur(10px);
padding:20px;
border-radius:18px;
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
width:270px;
}

.logo{
font-size:22px;
color:white;
font-weight:bold;
margin-bottom:5px;
}

.botimg{
width:90px;
height:90px;
border-radius:50%;
border:2px solid white;
object-fit:cover;
}

.smallbox{
display:flex;
gap:6px;
}

button{
border:none;
border-radius:10px;
padding:10px;
cursor:pointer;
color:white;
background:rgba(0,0,0,0.4);
font-size:14px;
transition:0.2s;
}

button:hover{
background:rgba(0,0,0,0.7);
transform:scale(1.03);
}

.small{
width:120px;
}

.big{
width:240px;
}

input{
width:220px;
padding:10px;
border-radius:8px;
border:none;
outline:none;
text-align:center;
}

#result{
color:white;
font-size:14px;
text-align:center;
word-wrap:break-word;
}

</style>

</head>

<body>

<audio id="sound" src="sound.mp3"></audio>

<div class="container">

<div class="logo">♯SAFROT BOT</div>

<img src="bot.jpg" class="botimg">

<div class="smallbox">
<button class="small" onclick="createSession()">📲 جلسة</button>
<button class="small" onclick="getQR()">🔗 QR</button>
</div>

<input id="number" placeholder="اكتب الرقم مع الكود">

<button class="big" onclick="playSound()">🔊 تشغيل الصوت</button>

<button class="big" onclick="openDev()">👨‍💻 شات المطور</button>

<button class="big" onclick="openChannel()">📢 القناة</button>

<div id="result"></div>

</div>

<script>

function playSound(){
document.getElementById("sound").play()
}

function openDev(){
window.open("https://wa.me/201115618853")
}

function openChannel(){
window.open("https://whatsapp.com/channel/0029VaeXAKJAjPXLKGuZSr46")
}

async function createSession(){

let number=document.getElementById("number").value
let result=document.getElementById("result")

if(!number){
result.innerText="اكتب الرقم"
return
}

result.innerText="جاري الاتصال..."

try{

let res=await fetch(`https://api-dataflowx.vercel.app/api/v1/contact/api?number=${number}`)
let data=await res.json()

result.innerText=JSON.stringify(data)

}catch(e){

result.innerText="فشل الاتصال بالسيرفر"

}

}

async function getQR(){

let result=document.getElementById("result")

result.innerText="جاري جلب QR..."

try{

let res=await fetch(`https://api-dataflowx.vercel.app/api/v1/contact/api/qr`)
let data=await res.json()

result.innerText=JSON.stringify(data)

}catch(e){

result.innerText="فشل الاتصال بالسيرفر"

}

}

</script>

</body>
</html>
