<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم الديناميكية</title>
<style>
  body {
    font-family: sans-serif;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  .image-container {
    position: relative;
    width: 100%;
    max-width: 600px;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
  }

  .image-container img {
    width: 100%;
    display: block;
  }

  /* شعار ♯ЅᗩFᏒOT꙯ */
  .logo {
    position: absolute;
    top: -50px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 30px;
    font-weight: bold;
    color: #ff4d4d;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
    z-index: 10;
    opacity: 0;
    animation: slideDown 1s forwards;
    animation-delay: 0.5s;
  }

  @keyframes slideDown {
    to {
      top: 10px;
      opacity: 1;
    }
  }

  /* الأزرار عمودية في وسط الصورة */
  .image-container .buttons {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    gap: 15px;
    z-index: 5;
  }

  .image-container button {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    background: rgba(0,0,0,0.7);
    color: #fff;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
  }

  .image-container button:hover {
    transform: scale(1.1);
    background: #ff4d4d;
  }

  /* المودال */
  #serviceResult {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #fff;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    max-width: 90%;
    max-height: 70%;
    overflow-y: auto;
    white-space: pre-wrap;
    z-index: 1000;
  }

  #serviceResult.show {
    display: block;
  }

  #closeBtn {
    position: absolute;
    top: 10px;
    right: 15px;
    background: #ff4d4d;
    border: none;
    border-radius: 50%;
    width: 25px;
    height: 25px;
    color: #fff;
    font-weight: bold;
    cursor: pointer;
  }

  @media (max-width: 480px) {
    .image-container button {
      width: 100%;
      font-size: 14px;
      padding: 10px;
    }
  }
</style>
</head>
<body>

<div class="image-container">
  <img src="background.jpg" alt="خلفية لوحة التحكم">

  <div class="logo">♯ЅᗩFᏒOT꙯</div>

  <div class="buttons">
    <button data-api="/api/hello">اختبر الـ API</button>
    <button data-api="/api/whatsapp">واتساب</button>
    <button data-api="/api/qr">QR Session</button>
    <button data-api="/api/telegram">Telegram</button>
    <button data-api="/api/vps">VPS</button>
  </div>
</div>

<div id="serviceResult">
  <button id="closeBtn">×</button>
  <pre id="resultContent"></pre>
</div>

<script>
const resultModal = document.getElementById('serviceResult');
const resultContent = document.getElementById('resultContent');
const closeBtn = document.getElementById('closeBtn');

closeBtn.addEventListener('click', () => {
    resultModal.classList.remove('show');
});

document.querySelectorAll('.buttons button').forEach(btn => {
    btn.addEventListener('click', async () => {
        const url = btn.dataset.api;
        resultContent.textContent = 'جارٍ الاتصال... 🔄';
        resultModal.classList.add('show');

        try {
            const res = await fetch(url);
            const data = await res.json();
            resultContent.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
            resultContent.textContent = 'حدث خطأ ❌: ' + err.message;
        }
    });
});
</script>

</body>
</html>
