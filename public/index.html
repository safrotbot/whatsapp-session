<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAFROT AI Dashboard</title>

<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
  background:#050510;
  color:#fff;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* خلفية متحركة */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at 20% 30%, rgba(0,150,255,.15), transparent 40%),
             radial-gradient(circle at 80% 70%, rgba(140,0,255,.15), transparent 40%);
  animation:bgMove 8s infinite alternate;
  z-index:0;
}

@keyframes bgMove{
  from{transform:translateY(-10px);}
  to{transform:translateY(10px);}
}

/* اللوجو */
#logo{
  position:absolute;
  top:25px;
  font-size:26px;
  font-weight:bold;
  letter-spacing:2px;
  background:linear-gradient(90deg,#00f0ff,#a100ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 15px rgba(0,255,255,.5);
  z-index:2;
}

/* الكارت */
.container{
  display:flex;
  flex-direction:column;
  gap:18px;
  align-items:center;
  background:rgba(15,15,35,.7);
  padding:30px;
  border-radius:18px;
  backdrop-filter:blur(15px);
  box-shadow:0 0 40px rgba(0,200,255,.2);
  z-index:2;
}

/* أزرار */
button.main-btn{
  width:260px;
  padding:12px;
  border-radius:12px;
  border:none;
  font-size:15px;
  cursor:pointer;
  background:linear-gradient(90deg,#007cf0,#a100ff);
  color:#fff;
  transition:.3s;
  box-shadow:0 0 15px rgba(0,200,255,.4);
}

button.main-btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px rgba(0,200,255,.8);
}

/* صندوق الرقم */
#whatsappBox{
  display:none;
  flex-direction:column;
  gap:10px;
  align-items:center;
  animation:fade .3s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(-5px);}
  to{opacity:1;transform:translateY(0);}
}

input{
  width:240px;
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
  text-align:center;
  background:rgba(255,255,255,.1);
  color:#fff;
  backdrop-filter:blur(10px);
}

input::placeholder{color:#ccc;}

.response{
  margin-top:8px;
  text-align:center;
  font-size:14px;
  max-width:260px;
}

/* لودينج */
.loader{
  border:3px solid rgba(255,255,255,.2);
  border-top:3px solid #00f0ff;
  border-radius:50%;
  width:18px;
  height:18px;
  animation:spin 1s linear infinite;
  margin:auto;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}
</style>
</head>
<body>

<div id="logo">SAFROT AI</div>

<div class="container">

  <button class="main-btn" id="whatsappBtn">📲 إنشاء جلسة واتساب</button>

  <div id="whatsappBox">
    <input type="text" id="numberInput" placeholder="201XXXXXXXX">
    <button class="main-btn" id="createSession">تشغيل الجلسة</button>
    <div class="response" id="result"></div>
  </div>

  <a href="https://api.whatsapp.com/send?phone=201115618853" target="_blank">
    <button class="main-btn">المطور</button>
  </a>

</div>

<script>
const whatsappBtn = document.getElementById("whatsappBtn");
const box = document.getElementById("whatsappBox");
const createBtn = document.getElementById("createSession");
const result = document.getElementById("result");

whatsappBtn.onclick=()=>{
  box.style.display="flex";
};

createBtn.onclick=async()=>{
  const number=document.getElementById("numberInput").value.trim();
  if(!number.match(/^20\\d{10}$/)){
    result.innerText="❌ الرقم لازم يبدأ بـ 20 ويتكون من 12 رقم";
    return;
  }

  result.innerHTML='<div class="loader"></div>';

  try{
    const res = await fetch(`/api/whatsapp?number=${number}`);
    const data = await res.json();

    if(data.success){
      result.innerHTML=`✅ كود الجلسة:<br><b>${data.code || "غير متوفر"}</b>`;
    }else{
      result.innerText=data.message || "❌ حدث خطأ";
    }
  }catch{
    result.innerText="❌ فشل الاتصال بالسيرفر";
  }
};
</script>

</body>
</html>
