<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم الديناميكية - واتساب</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: sans-serif;
    overflow: hidden;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    background: url('background.jpg') no-repeat center center/cover;
    position: relative;
  }

  /* الشعار */
  #logo {
    position: absolute;
    top: 20px;
    font-size: 30px;
    color: #fff;
    font-weight: bold;
    text-shadow: 0 0 5px rgba(0,0,0,0.5);
    animation: shake 1s ease-in-out infinite alternate;
  }

  @keyframes shake {
    0% { transform: translateY(0px); }
    100% { transform: translateY(-5px); }
  }

  /* الحاوية للأزرار */
  .button-container {
    display: flex;
    flex-direction: column;
    gap: 15px;
    align-items: center;
  }

  .button-container button {
    width: 220px;
    padding: 15px 0;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    background: rgba(0,0,0,0.7);
    color: #fff;
    transition: all 0.2s;
  }

  .button-container button:hover {
    background: #ff4d4d;
    transform: scale(1.05);
  }

  /* المودال للنتيجة */
  #serviceResult {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #fff;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    max-width: 90%;
    max-height: 70%;
    overflow-y: auto;
    white-space: pre-wrap;
    z-index: 1000;
  }

  #serviceResult.show {
    display: block;
  }

  #closeBtn {
    position: absolute;
    top: 10px;
    right: 15px;
    background: #ff4d4d;
    border: none;
    border-radius: 50%;
    width: 25px;
    height: 25px;
    color: #fff;
    font-weight: bold;
    cursor: pointer;
  }

  @media (max-width: 480px) {
    .button-container button {
      width: 160px;
      font-size: 14px;
      padding: 10px 0;
    }
    #logo { font-size: 24px; }
  }
</style>
</head>
<body>

<div id="logo">♯ЅᗩFᏒOT꙯</div>

<div class="button-container">
  <button data-api="/api/hello">اختبر API</button>
  <button id="whatsappBtn">واتساب</button>
  <button data-api="/api/qr">QR Session</button>
  <button data-api="/api/telegram">Telegram</button>
  <button data-api="/api/vps">VPS</button>
</div>

<div id="serviceResult">
  <button id="closeBtn">×</button>
  <pre id="resultContent"></pre>
</div>

<!-- الصوت الخلفي -->
<audio id="bgAudio" autoplay loop>
  <source src="sound.mp3" type="audio/mpeg">
  متصفحك لا يدعم تشغيل الصوت.
</audio>

<script>
const resultModal = document.getElementById('serviceResult');
const resultContent = document.getElementById('resultContent');
const closeBtn = document.getElementById('closeBtn');
const audio = document.getElementById('bgAudio');

closeBtn.addEventListener('click', () => {
    resultModal.classList.remove('show');
});

// تشغيل الصوت (للتأكد من أن الصوت ممكن يشتغل بعد تفاعل المستخدم)
window.addEventListener('load', () => {
    audio.volume = 0.3;
    audio.play().catch(() => console.log("الصوت يحتاج تفاعل المستخدم لتشغيله"));
});

// أزرار غير واتساب
document.querySelectorAll('.button-container button[data-api]').forEach(btn => {
    btn.addEventListener('click', async () => {
        const url = btn.dataset.api;
        resultContent.textContent = 'جارٍ الاتصال... 🔄';
        resultModal.classList.add('show');

        try {
            const res = await fetch(url);
            const data = await res.json();
            resultContent.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
            resultContent.textContent = 'حدث خطأ ❌: ' + err.message;
        }
    });
});

// زر واتساب - يظهر prompt لنفس الزر ويعمل الجلسة
document.getElementById('whatsappBtn').addEventListener('click', async () => {
    const number = prompt("💡 اكتب رقم الهاتف لجلسة واتساب (مثال: 967772350066):");
    if (!number) return;

    resultContent.textContent = '⏳ جارٍ إرسال طلب الجلسة للرقم: ' + number;
    resultModal.classList.add('show');

    try {
        const res = await fetch(`/api/whatsapp?number=${encodeURIComponent(number)}`);
        const data = await res.json();
        let code = data.code || data.message || null;

        if (code) {
            resultContent.textContent = `✅ كود الجلسة للرقم ${number}:\n\n${code}\n\nاضغط على زر نسخ الكود في التطبيق.`;
        } else {
            resultContent.textContent = `⚠️ لم يتم العثور على كود للرقم ${number}.\n\nالاستجابة:\n` + JSON.stringify(data, null, 2);
        }
    } catch (err) {
        resultContent.textContent = '❌ حدث خطأ: ' + err.message;
    }
});
</script>

</body>
</html>
