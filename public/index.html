<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>

<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
}
body{
  display:flex;
  justify-content:center;
  align-items:center;
  background:url('background.jpg') no-repeat center center/cover;
  position:relative;
}
body::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(3px);
  z-index:0;
}
#logo{
  position:absolute;
  top:25px;
  font-size:24px;
  color:#fff;
  font-weight:bold;
  text-shadow:0 0 10px rgba(255,255,255,0.4);
  z-index:2;
}
.container{
  display:flex;
  flex-direction:column;
  gap:15px;
  align-items:center;
  z-index:2;
}
.buttons-row{
  display:flex;
  gap:10px;
}
button.main-btn{
  width:120px;
  padding:10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(0,0,0,0.35);
  color:#fff;
  font-size:16px;
  cursor:pointer;
  backdrop-filter:blur(10px);
  transition:all .2s ease;
}
button.main-btn:hover{
  background:rgba(0,0,0,0.55);
  transform:translateY(-2px);
}
#whatsappBox{
  display:none;
  flex-direction:column;
  gap:8px;
  align-items:center;
  animation:fade .3s ease;
}
@keyframes fade{
  from{opacity:0;transform:translateY(-5px);}
  to{opacity:1;transform:translateY(0);}
}
input{
  width:220px;
  padding:10px;
  border-radius:8px;
  border:none;
  outline:none;
  text-align:center;
  background:rgba(255,255,255,0.15);
  color:#fff;
  backdrop-filter:blur(8px);
}
input::placeholder{
  color:#ddd;
}
.response{
  color:#fff;
  margin-top:5px;
  text-align:center;
  max-width:260px;
  word-wrap:break-word;
  font-size:14px;
}
#audioBtn{
  width:35px;
  height:35px;
  font-size:18px;
  position:absolute;
  top:0;
  right:50px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.3);
  background:rgba(0,0,0,0.25);
  color:#fff;
  cursor:pointer;
  backdrop-filter:blur(6px);
}
</style>
</head>
<body>

<div id="logo">♯ЅᗩFᏒOT꙯</div>

<div class="container">

  <!-- صف الأزرار الصغيرة -->
  <div class="buttons-row">
    <button class="main-btn" id="whatsappBtn">📲 جلسة واتساب</button>
    <button class="main-btn" id="qrBtn">🟢 QR واتساب</button>
  </div>

  <!-- خانة الرقم + إنشاء الجلسة -->
  <div id="whatsappBox">
    <input type="text" id="numberInput" placeholder="اكتب الرقم هنا">
    <button class="main-btn" id="createSession">إنشاء جلسة</button>
    <div class="response" id="result"></div>
  </div>

  <!-- أزرار خارجية -->
  <a href="https://api.whatsapp.com/send?phone=201115618853" target="_blank">
    <button class="main-btn">المطور</button>
  </a>

  <a href="https://whatsapp.com/channel/0029VaeXAKJAjPXLKGuZSr46" target="_blank">
    <button class="main-btn">القناة</button>
  </a>

  <!-- زر التحكم بالصوت صغير فوق زر القناة -->
  <button id="audioBtn">🔊</button>

</div>

<!-- الصوت الخلفي -->
<audio id="bgAudio" loop>
  <source src="sound.mp3" type="audio/mpeg">
</audio>

<script>
const whatsappBtn = document.getElementById("whatsappBtn");
const qrBtn = document.getElementById("qrBtn");
const box = document.getElementById("whatsappBox");
const createBtn = document.getElementById("createSession");
const result = document.getElementById("result");
const audio = document.getElementById("bgAudio");
const audioBtn = document.getElementById("audioBtn");

/* تشغيل الصوت بعد أول ضغطة */
document.addEventListener("click",()=>{
  if(audio.paused){
    audio.volume=0.3;
    audio.play().catch(()=>{});
  }
},{once:true});

/* زر الصوت */
audioBtn.onclick=()=>{
  if(audio.paused){
    audio.play().catch(()=>{});
    audioBtn.innerText="🔇";
  }else{
    audio.pause();
    audioBtn.innerText="🔊";
  }
};

/* إظهار خانة الرقم */
whatsappBtn.onclick=()=>{ 
  box.style.display="flex";
  result.innerHTML="";
};

/* زر QR */
qrBtn.onclick=async()=>{
  box.style.display="flex";
  result.innerText="⏳ جاري تحميل QR...";

  try{
    const res = await fetch("https://knight-bot-paircode.onrender.com/qr");
    const data = await res.json();

    if(data.qr){
      result.innerHTML = `
        <img 
        src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${data.qr}" 
        style="margin-top:10px;border-radius:10px;" />
      `;
    } else {
      result.innerText="❌ مفيش QR متاح حالياً";
    }

  }catch{
    result.innerText="❌ فشل الاتصال بالسيرفر";
  }
};

/* إنشاء جلسة Pair Code */
createBtn.onclick=async()=>{
  const number=document.getElementById("numberInput").value.trim();

  if(!number){
    result.innerText="❌ اكتب رقم صحيح";
    return;
  }

  result.innerText="⏳ جاري إنشاء الكود...";

  try{
    const res = await fetch(`https://knight-bot-paircode.onrender.com/pair?number=${number}`);
    const data = await res.json();

    if(data.code){
      result.innerHTML = `
        ✅ كود الجلسة:<br>
        <b style="font-size:18px">${data.code}</b>
      `;
    }else{
      result.innerText=data.message || "❌ فشل إنشاء الكود";
    }

  }catch{
    result.innerText="❌ فشل الاتصال بالسيرفر";
  }
};
</script>

</body>
</html>
