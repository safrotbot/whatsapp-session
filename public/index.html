<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
font-family:sans-serif;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;
background:url('background.jpg') no-repeat center center/cover;
position:relative;
}

/* الشعار */
#logo{
position:absolute;
top:20px;
font-size:32px;
color:#ffffff;
font-weight:bold;
text-shadow:0 0 10px rgba(0,0,0,0.7);
animation:shake 1s ease-in-out infinite alternate;
}

@keyframes shake{
0%{transform:translateY(0);}
100%{transform:translateY(-6px);}
}

/* الحاوية */
.container{
display:flex;
flex-direction:column;
gap:15px;
align-items:center;
}

/* الأزرار */
button{
width:230px;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
background:rgba(0,0,0,0.75);
color:#fff;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

/* صندوق إدخال الرقم */
#whatsappBox{
display:none;
flex-direction:column;
gap:8px;
align-items:center;
}

input{
width:210px;
padding:10px;
border-radius:8px;
border:none;
text-align:center;
outline:none;
}

.response{
color:#fff;
margin-top:5px;
text-align:center;
max-width:230px;
word-wrap:break-word;
font-size:14px;
}
</style>
</head>
<body>

<div id="logo">♯ЅᗩFᏒOT꙯</div>

<div class="container">

<button id="whatsappBtn">📲 جلسة واتساب</button>

<div id="whatsappBox">
<input type="text" id="numberInput" placeholder="اكتب الرقم هنا">
<button id="createSession" style="background:#25D366;">إنشاء جلسة</button>
</div>

<div class="response" id="result"></div>

<a href="https://api.whatsapp.com/send?phone=201115618853" target="_blank">
<button style="background:#128C7E;">📞 التواصل مع المطور</button>
</a>

<a href="https://whatsapp.com/channel/0029VaeXAKJAjPXLKGuZSr46" target="_blank">
<button style="background:#075E54;">📢 قناة واتساب</button>
</a>

</div>

<audio id="bgAudio" loop>
<source src="sound.mp3" type="audio/mpeg">
</audio>

<script>
const whatsappBtn = document.getElementById("whatsappBtn");
const box = document.getElementById("whatsappBox");
const createBtn = document.getElementById("createSession");
const result = document.getElementById("result");
const audio = document.getElementById("bgAudio");

/* تشغيل الصوت أول ضغطة */
document.addEventListener("click",()=>{
if(audio.paused){
audio.volume=0.3;
audio.play().catch(()=>{});
}
},{once:true});

/* إظهار خانة الرقم */
whatsappBtn.onclick=()=>{
box.style.display="flex";
};

/* إنشاء الجلسة */
createBtn.onclick=async()=>{
const number=document.getElementById("numberInput").value.trim();

if(!number){
result.innerText="❌ اكتب رقم صحيح";
return;
}

result.innerText="⏳ جاري الاتصال...";

try{
const res=await fetch(`/api/whatsapp?number=${number}`);
const data=await res.json();
result.innerText=JSON.stringify(data,null,2);
}catch(err){
result.innerText="❌ فشل الاتصال بالسيرفر";
}
};
</script>

</body>
</html>
