<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>

<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
  background:url('background.jpg') no-repeat center center/cover;
  position:relative;
}

/* طبقة تغميق خفيفة */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(3px);
  z-index:0;
}

/* الشعار */
#logo{
  position:absolute;
  top:25px;
  font-size:34px;
  color:#fff;
  font-weight:bold;
  text-shadow:0 0 15px rgba(255,255,255,0.4);
  animation:float 2s ease-in-out infinite alternate;
  z-index:2;
}

@keyframes float{
  0%{transform:translateY(0);}
  100%{transform:translateY(-8px);}
}

/* زر التحكم في الصوت */
#audioBtn{
  position:absolute;
  top:25px;
  right:15px;
  font-size:14px;
  padding:5px 10px;
  border:none;
  border-radius:5px;
  background:rgba(0,0,0,0.4);
  color:#fff;
  cursor:pointer;
  z-index:2;
}

/* الحاوية */
.container{
  display:flex;
  flex-direction:column;
  gap:18px;
  align-items:center;
  z-index:2;
}

/* أزرار زجاجية */
button.main-btn{
  width:250px;
  padding:15px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(0,0,0,0.45);
  color:#fff;
  font-size:16px;
  cursor:pointer;
  backdrop-filter:blur(12px);
  box-shadow:0 8px 25px rgba(0,0,0,0.4);
  transition:all .25s ease;
}

button.main-btn:hover{
  background:rgba(0,0,0,0.65);
  transform:translateY(-3px);
  box-shadow:0 12px 30px rgba(0,0,0,0.6);
}

button.main-btn:active{
  background:rgba(0,0,0,0.8);
  transform:scale(0.96);
}

/* صندوق الرقم */
#whatsappBox{
  display:none;
  flex-direction:column;
  gap:10px;
  align-items:center;
  animation:fade .3s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(-5px);}
  to{opacity:1;transform:translateY(0);}
}

input{
  width:220px;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
  text-align:center;
  background:rgba(255,255,255,0.15);
  color:#fff;
  backdrop-filter:blur(10px);
}

input::placeholder{
  color:#ddd;
}

.response{
  color:#fff;
  margin-top:5px;
  text-align:center;
  max-width:260px;
  word-wrap:break-word;
  font-size:14px;
}
</style>
</head>
<body>

<div id="logo">♯ЅᗩFᏒOT꙯</div>
<button id="audioBtn">🔊 تشغيل/إيقاف الصوت</button>

<div class="container">

  <button class="main-btn" id="whatsappBtn">📲 جلسة واتساب</button>

  <div id="whatsappBox">
    <input type="text" id="numberInput" placeholder="اكتب الرقم هنا">
    <button class="main-btn" id="createSession">إنشاء جلسة</button>
  </div>

  <div class="response" id="result"></div>

  <a href="https://api.whatsapp.com/send?phone=201115618853" target="_blank">
    <button class="main-btn">المطور</button>
  </a>

  <a href="https://whatsapp.com/channel/0029VaeXAKJAjPXLKGuZSr46" target="_blank">
    <button class="main-btn">القناة</button>
  </a>

</div>

<audio id="bgAudio" loop>
  <source src="sound.mp3" type="audio/mpeg">
</audio>

<script>
const whatsappBtn = document.getElementById("whatsappBtn");
const box = document.getElementById("whatsappBox");
const createBtn = document.getElementById("createSession");
const result = document.getElementById("result");
const audio = document.getElementById("bgAudio");
const audioBtn = document.getElementById("audioBtn");

/* تشغيل الصوت بعد أول تفاعل */
document.addEventListener("click",()=>{
  if(audio.paused){
    audio.volume=0.3;
    audio.play().catch(()=>{});
  }
},{once:true});

/* زر التحكم بالصوت */
audioBtn.onclick=()=>{
  if(audio.paused){
    audio.play().catch(()=>{});
  }else{
    audio.pause();
  }
};

/* إظهار خانة الرقم */
whatsappBtn.onclick=()=>{
  box.style.display="flex";
};

/* إنشاء الجلسة */
createBtn.onclick=async()=>{
  const number=document.getElementById("numberInput").value.trim();
  if(!number){
    result.innerText="❌ اكتب رقم صحيح";
    return;
  }
  result.innerText="⏳ جاري الاتصال...";
  try{
    const res=await fetch(`/api/whatsapp?number=${number}`);
    const data=await res.json();
    result.innerText=JSON.stringify(data,null,2);
  }catch(err){
    result.innerText="❌ فشل الاتصال بالسيرفر";
  }
};
</script>

</body>
</html>
