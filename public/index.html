<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم الديناميكية - واتساب</title>
<style>
html, body {
  margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden;
}
body {
  display: flex; justify-content: center; align-items: center;
  background: url('background.jpg') no-repeat center center/cover; position: relative;
}

/* الشعار */
#logo {
  position: absolute; top: 20px;
  font-size: 30px; color: #fff; font-weight: bold;
  text-shadow: 0 0 5px rgba(0,0,0,0.5);
  animation: shake 1s ease-in-out infinite alternate;
}
@keyframes shake { 0% { transform: translateY(0px); } 100% { transform: translateY(-5px); } }

/* الأزرار */
.button-container {
  display: flex; flex-direction: column; gap: 15px; align-items: center;
}
.button-container button {
  width: 220px; padding: 15px 0; border: none; border-radius: 10px;
  font-size: 16px; font-weight: bold; cursor: pointer;
  background: rgba(0,0,0,0.7); color: #fff; transition: all 0.2s;
}
.button-container button:hover {
  background: #ff4d4d; transform: scale(1.05);
}

/* الرد أسفل الزر */
.button-container .response {
  margin-top: 5px; color: #fff; font-size: 14px; text-align: center;
  max-width: 220px; word-wrap: break-word;
}

@media (max-width: 480px) {
  .button-container button { width: 160px; font-size: 14px; padding: 10px 0; }
  #logo { font-size: 24px; }
}
</style>
</head>
<body>

<div id="logo">♯ЅᗩFᏒOT꙯</div>

<div class="button-container">
  <button data-api="/api/hello">اختبر API</button>
  <button id="whatsappBtn">واتساب</button>
  <div class="response" id="whatsappResponse"></div>
  <button data-api="/api/qr">QR Session</button>
  <button data-api="/api/telegram">Telegram</button>
  <button data-api="/api/vps">VPS</button>
</div>

<audio id="bgAudio" loop>
  <source src="sound.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById('bgAudio');

// تشغيل الصوت عند أول تفاعل مع أي زر
document.querySelectorAll('.button-container button').forEach(btn => {
  btn.addEventListener('click', () => {
    if (audio.paused) {
      audio.volume = 0.3;
      audio.play().catch(()=>console.log("الصوت يحتاج تفاعل المستخدم"));
    }
  });
});

// أزرار غير واتساب
document.querySelectorAll('.button-container button[data-api]').forEach(btn => {
    btn.addEventListener('click', async () => {
        const url = btn.dataset.api;
        const respDiv = btn.nextElementSibling?.classList.contains('response') ? btn.nextElementSibling : null;
        if(respDiv) respDiv.textContent = 'جارٍ الاتصال... 🔄';

        try {
            const res = await fetch(url);
            const data = await res.json();
            if(respDiv) respDiv.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
            if(respDiv) respDiv.textContent = 'حدث خطأ ❌: ' + err.message;
        }
    });
});

// زر واتساب
document.getElementById('whatsappBtn').addEventListener('click', async () => {
    const number = prompt("💡 اكتب رقم الهاتف لجلسة واتساب (مثال: 967772350066):");
    if (!number) return;

    const respDiv = document.getElementById('whatsappResponse');
    respDiv.textContent = '⏳ جارٍ إرسال طلب الجلسة للرقم: ' + number;

    try {
        const res = await fetch(`/api/whatsapp?number=${encodeURIComponent(number)}`);
        const data = await res.json();
        let code = data.code || data.message || null;

        if(code) {
            respDiv.textContent = `✅ كود الجلسة للرقم ${number}:\n${code}`;
        } else {
            respDiv.textContent = `⚠️ لم يتم العثور على كود للرقم ${number}.\n\nالاستجابة:\n${JSON.stringify(data,null,2)}`;
        }
    } catch(err) {
        respDiv.textContent = '❌ حدث خطأ: ' + err.message;
    }
});
</script>

</body>
</html>
