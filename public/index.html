<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>

<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
  background:url('background.jpg') no-repeat center center/cover;
  position:relative;
}

body::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(3px);
  z-index:0;
}

#logo{
  position:absolute;
  top:25px;
  font-size:24px;
  color:#fff;
  font-weight:bold;
  z-index:2;
}

.container{
  display:flex;
  flex-direction:column;
  gap:15px;
  align-items:center;
  z-index:2;
}

/* صف زرين جنب بعض */
.row{
  display:flex;
  gap:10px;
}

/* زر أساسي */
button.main-btn{
  width:200px;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(0,0,0,0.35);
  color:#fff;
  font-size:16px;
  cursor:pointer;
  backdrop-filter:blur(10px);
  transition:.2s;
}

button.main-btn:hover{
  background:rgba(0,0,0,0.55);
  transform:translateY(-2px);
}

/* زر صغير QR */
button.qr-btn{
  width:50px;
  padding:12px 0;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(0,0,0,0.35);
  color:#fff;
  font-size:18px;
  cursor:pointer;
  backdrop-filter:blur(10px);
}

/* صندوق الرقم */
#whatsappBox{
  display:none;
  flex-direction:column;
  gap:8px;
  align-items:center;
  animation:fade .3s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(-5px);}
  to{opacity:1;transform:translateY(0);}
}

input{
  width:220px;
  padding:10px;
  border-radius:8px;
  border:none;
  outline:none;
  text-align:center;
  background:rgba(255,255,255,0.15);
  color:#fff;
}

.response{
  color:#fff;
  margin-top:5px;
  text-align:center;
  max-width:260px;
  font-size:14px;
}

/* حاوية القناة للصوت */
.channel-wrapper{
  position:relative;
}

/* زر الصوت */
#audioBtn{
  position:absolute;
  top:-10px;
  right:-10px;
  width:35px;
  height:35px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.1);
  color:#fff;
  cursor:pointer;
  font-size:14px;
}
</style>
</head>
<body>

<div id="logo">♯ЅᗩFᏒOT꙯</div>

<div class="container">

  <!-- جلسة + QR -->
  <div class="row">
    <button class="main-btn" id="whatsappBtn">📲 جلسة واتساب</button>
    <button class="qr-btn" id="qrBtn">🔳</button>
  </div>

  <!-- صندوق الإدخال -->
  <div id="whatsappBox">
    <input type="text" id="numberInput" placeholder="اكتب الرقم هنا">
    <button class="main-btn" id="createSession">إنشاء جلسة</button>
    <div class="response" id="result"></div>
  </div>

  <!-- المطور -->
  <a href="https://api.whatsapp.com/send?phone=201115618853" target="_blank">
    <button class="main-btn">المطور</button>
  </a>

  <!-- القناة + الصوت -->
  <div class="channel-wrapper">
    <a href="https://whatsapp.com/channel/0029VaeXAKJAjPXLKGuZSr46" target="_blank">
      <button class="main-btn">القناة</button>
    </a>
    <button id="audioBtn">🔊</button>
  </div>

</div>

<audio id="bgAudio" loop>
  <source src="sound.mp3" type="audio/mpeg">
</audio>

<script>
const whatsappBtn = document.getElementById("whatsappBtn");
const qrBtn = document.getElementById("qrBtn");
const box = document.getElementById("whatsappBox");
const createBtn = document.getElementById("createSession");
const result = document.getElementById("result");
const audio = document.getElementById("bgAudio");
const audioBtn = document.getElementById("audioBtn");

/* تشغيل الصوت */
document.addEventListener("click",()=>{
  if(audio.paused){
    audio.volume=0.3;
    audio.play().catch(()=>{});
  }
},{once:true});

/* زر الصوت */
audioBtn.onclick=()=>{
  if(audio.paused){
    audio.play().catch(()=>{});
    audioBtn.innerText="🔇";
  }else{
    audio.pause();
    audioBtn.innerText="🔊";
  }
};

/* عرض الصندوق */
whatsappBtn.onclick=()=>{ box.style.display="flex"; };

qrBtn.onclick=async()=>{
  box.style.display="flex";
  result.innerText="⏳ جاري تحميل QR...";

  try{
    const res = await fetch("PUT-YOUR-API-QR-LINK");
    const data = await res.json();

    if(data.qr){
      result.innerHTML=`<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${data.qr}" />`;
    }else{
      result.innerText="❌ فشل تحميل QR";
    }

  }catch{
    result.innerText="❌ فشل الاتصال بالسيرفر";
  }
};

/* إنشاء جلسة */
createBtn.onclick=async()=>{
  const number=document.getElementById("numberInput").value.trim();
  if(!number){
    result.innerText="❌ اكتب رقم صحيح";
    return;
  }

  result.innerText="⏳ جاري إنشاء الجلسة...";

  try{
    const res = await fetch(`PUT-YOUR-API-PAIR-LINK?number=${number}`);
    const data = await res.json();

    if(data.success){
      result.innerHTML=`✅ كود الجلسة:<br><b>${data.code}</b>`;
    }else{
      result.innerText=data.message || "❌ حدث خطأ";
    }

  }catch{
    result.innerText="❌ فشل الاتصال بالسيرفر";
  }
};
</script>

</body>
</html>
