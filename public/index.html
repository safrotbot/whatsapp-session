<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم - SAFROT Tech</title>

<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
  background:#050510;
  color:#fff;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* خطوط تقنية تتحرك */
.tech-lines{
  position:absolute;
  inset:0;
  z-index:0;
  overflow:hidden;
}
.tech-line{
  position:absolute;
  width:2px;
  height:100%;
  background:rgba(0,200,255,.15);
  animation:moveLine linear infinite;
}
@keyframes moveLine{
  0%{transform:translateY(-100%);}
  100%{transform:translateY(100%);}
}

/* شعار مع تأثير Glitch */
#logo{
  position:absolute;
  top:25px;
  font-size:28px;
  font-weight:bold;
  letter-spacing:2px;
  z-index:2;
  color:#0ff;
  text-shadow:0 0 5px #0ff,0 0 10px #0ff,0 0 15px #a100ff;
}
@keyframes glitch{
  0%{transform:translate(0);}
  20%{transform:translate(-2px,2px);}
  40%{transform:translate(2px,-2px);}
  60%{transform:translate(-2px,-2px);}
  80%{transform:translate(2px,2px);}
  100%{transform:translate(0);}
}
#logo:hover{
  animation:glitch 0.5s infinite;
}

/* الحاوية */
.container{
  display:flex;
  flex-direction:column;
  gap:15px;
  align-items:center;
  background:rgba(15,15,35,.7);
  padding:30px;
  border-radius:18px;
  backdrop-filter:blur(15px);
  box-shadow:0 0 40px rgba(0,200,255,.2);
  z-index:2;
}

/* أزرار مع تأثير Neon */
button.main-btn{
  width:250px;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(0,255,255,0.3);
  background:rgba(0,0,0,0.35);
  color:#0ff;
  font-size:16px;
  cursor:pointer;
  backdrop-filter:blur(10px);
  transition:all .3s ease;
  box-shadow:0 0 5px #0ff,0 0 10px #0ff inset;
}
button.main-btn:hover{
  background:rgba(0,0,0,0.55);
  transform:translateY(-2px);
  box-shadow:0 0 20px #0ff,0 0 40px #a100ff inset;
}

/* صندوق الرقم */
#whatsappBox{
  display:none;
  flex-direction:column;
  gap:8px;
  align-items:center;
  animation:fade .3s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(-5px);}
  to{opacity:1;transform:translateY(0);}
}

input{
  width:220px;
  padding:10px;
  border-radius:8px;
  border:none;
  outline:none;
  text-align:center;
  background:rgba(0,0,0,0.15);
  color:#fff;
  backdrop-filter:blur(8px);
}

input::placeholder{
  color:#ddd;
}

.response{
  color:#fff;
  margin-top:5px;
  text-align:center;
  max-width:260px;
  word-wrap:break-word;
  font-size:14px;
}

/* زر الصوت أيقونة */
#audioBtn{
  position:absolute;
  bottom:20px;
  right:20px;
  width:45px;
  height:45px;
  border-radius:50%;
  border:none;
  background:rgba(0,0,0,0.4);
  color:#0ff;
  font-size:22px;
  cursor:pointer;
  backdrop-filter:blur(8px);
  box-shadow:0 0 10px #0ff,0 0 20px #0ff inset;
  z-index:2;
  transition:all .3s ease;
}
#audioBtn:hover{
  box-shadow:0 0 25px #0ff,0 0 40px #a100ff inset;
}
</style>
</head>
<body>

<div id="logo">♯ЅᗩFᏒOT꙯</div>

<div class="tech-lines" id="lines"></div>

<div class="container">

  <!-- زر جلسة واتساب -->
  <button class="main-btn" id="whatsappBtn">📲 جلسة واتساب</button>

  <!-- خانة الرقم + إنشاء الجلسة -->
  <div id="whatsappBox">
    <input type="text" id="numberInput" placeholder="اكتب الرقم هنا">
    <button class="main-btn" id="createSession">إنشاء جلسة</button>
    <div class="response" id="result"></div>
  </div>

  <!-- أزرار خارجية -->
  <a href="https://api.whatsapp.com/send?phone=201115618853" target="_blank">
    <button class="main-btn">المطور</button>
  </a>

  <a href="https://whatsapp.com/channel/0029VaeXAKJAjPXLKGuZSr46" target="_blank">
    <button class="main-btn">القناة</button>
  </a>

  <!-- زر التحكم بالصوت أيقونة -->
  <button id="audioBtn">🔊</button>

</div>

<!-- الصوت الخلفي -->
<audio id="bgAudio" loop>
  <source src="sound.mp3" type="audio/mpeg">
</audio>

<script>
const whatsappBtn = document.getElementById("whatsappBtn");
const box = document.getElementById("whatsappBox");
const createBtn = document.getElementById("createSession");
const result = document.getElementById("result");
const audio = document.getElementById("bgAudio");
const audioBtn = document.getElementById("audioBtn");
const lines = document.getElementById("lines");

/* إضافة خطوط نيون متحركة */
for(let i=0;i<30;i++){
  let div=document.createElement('div');
  div.className='tech-line';
  div.style.left=Math.random()*100+'%';
  div.style.animationDuration=(5+Math.random()*5)+'s';
  lines.appendChild(div);
}

/* تشغيل الصوت عند أول ضغطة */
document.addEventListener("click",()=>{
  if(audio.paused){
    audio.volume=0.25;
    audio.play().catch(()=>{});
  }
},{once:true});

/* التحكم بالايقونة */
audioBtn.onclick=()=>{
  if(audio.paused){
    audio.play().catch(()=>{});
    audioBtn.innerText="🔇";
  }else{
    audio.pause();
    audioBtn.innerText="🔊";
  }
};

/* إظهار خانة الرقم */
whatsappBtn.onclick=()=>{
  box.style.display="flex";
};

/* إنشاء الجلسة */
createBtn.onclick=async()=>{
  const number=document.getElementById("numberInput").value.trim();
  if(!number){
    result.innerText="❌ اكتب رقم صحيح";
    return;
  }
  result.innerText="⏳ جاري الاتصال...";

  try{
    const res = await fetch(`/api/whatsapp?number=${number}`);
    const data = await res.json();

    if(data.success){
      result.innerHTML=`✅ كود الجلسة للرقم ${number}:<br><b>${data.code || "غير متوفر"}</b>`;
    }else{
      result.innerText=data.message || "❌ حدث خطأ";
    }
  }catch(err){
    result.innerText="❌ فشل الاتصال بالسيرفر";
  }
};
</script>

</body>
</html>
