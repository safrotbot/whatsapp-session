<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>

<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
  background:url('background.jpg') no-repeat center center/cover;
  background-size:cover;
}

body::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(3px);
  z-index:0;
}

#logo{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:18px;
  font-weight:bold;
  color:#0ff;
  text-shadow:0 0 5px #0ff, 0 0 15px #0f0;
  z-index:2;
}

.container{
  display:flex;
  flex-direction:column;
  gap:15px;
  align-items:center;
  z-index:2;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
}

button.main-btn{
  width:250px;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(0,255,255,0.3);
  background:rgba(0,0,0,0.35);
  color:#0ff;
  font-size:16px;
  cursor:pointer;
  backdrop-filter:blur(10px);
  transition:all .2s ease;
  box-shadow:0 0 5px #0ff,0 0 10px #0ff inset;
}
button.main-btn:hover{
  background:rgba(0,0,0,0.55);
  transform:translateY(-2px);
  box-shadow:0 0 25px #0ff,0 0 50px #0ff inset;
  text-shadow:0 0 5px #0ff;
}
button.main-btn:active{
  transform:scale(0.95);
  box-shadow:0 0 30px #0ff,0 0 60px #0ff inset;
}

#whatsappBox{
  display:none;
  flex-direction:column;
  gap:8px;
  align-items:center;
  animation:fade .3s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(-5px);}
  to{opacity:1;transform:translateY(0);}
}

input{
  width:220px;
  padding:10px;
  border-radius:8px;
  border:none;
  outline:none;
  text-align:center;
  background:rgba(255,255,255,0.15);
  color:#fff;
  backdrop-filter:blur(8px);
}

input::placeholder{
  color:#ddd;
}

.response{
  color:#fff;
  margin-top:5px;
  text-align:center;
  max-width:260px;
  word-wrap:break-word;
  font-size:14px;
}

.audio-container{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
}

#audioBtn{
  width:35px;
  height:35px;
  border-radius:50%;
  border:1px solid rgba(0,255,255,0.3);
  background:rgba(0,0,0,0.35);
  color:#0ff;
  font-size:18px;
  cursor:pointer;
  backdrop-filter:blur(10px);
  box-shadow:0 0 5px #0ff,0 0 10px #0ff inset;
  transition:all .2s ease, box-shadow 0.3s ease, color 0.3s ease;
  position:absolute;
  top:-10px;
  right:-10px;
}
#audioBtn:hover{
  background:rgba(0,0,0,0.55);
  box-shadow:0 0 25px #0ff,0 0 50px #0ff inset, 0 0 10px #0f0;
  color:#0f0;
}
#audioBtn:active{
  transform:scale(0.95);
  box-shadow:0 0 35px #0ff,0 0 70px #0ff inset, 0 0 15px #0f0;
}

.container:hover #logo{
  text-shadow:0 0 10px #0ff,0 0 20px #0f0,0 0 30px #0ff;
}

#qrImage{
  margin-top:10px;
  display:none;
  width:200px;
  border:2px solid #0ff;
  border-radius:12px;
}
</style>
</head>
<body>

<div id="logo">♯ЅᗩFᏒOT꙯</div>

<div class="container">
  <button class="main-btn" id="whatsappBtn">📲 جلسة واتساب</button>

  <div id="whatsappBox">
    <input type="text" id="numberInput" placeholder="اكتب الرقم هنا">
    <button class="main-btn" id="createSession">إنشاء جلسة</button>
    <div class="response" id="result"></div>
    <img id="qrImage" />
  </div>

  <a href="https://api.whatsapp.com/send?phone=201115618853" target="_blank">
    <button class="main-btn">المطور</button>
  </a>

  <div class="audio-container">
    <a href="https://whatsapp.com/channel/0029VaeXAKJAjPXLKGuZSr46" target="_blank">
      <button class="main-btn">القناة</button>
    </a>
    <button id="audioBtn">🔊</button>
  </div>
</div>

<audio id="bgAudio" loop>
  <source src="sound.mp3" type="audio/mpeg">
</audio>

<script>
const whatsappBtn = document.getElementById("whatsappBtn");
const box = document.getElementById("whatsappBox");
const createBtn = document.getElementById("createSession");
const result = document.getElementById("result");
const qrImage = document.getElementById("qrImage");
const audio = document.getElementById("bgAudio");
const audioBtn = document.getElementById("audioBtn");

document.addEventListener("click",()=>{
  if(audio.paused){
    audio.volume=0.3;
    audio.play().catch(()=>{});
  }
},{once:true});

audioBtn.onclick=()=>{
  if(audio.paused){
    audio.play().catch(()=>{});
    audioBtn.innerText = "🔇";
  }else{
    audio.pause();
    audioBtn.innerText = "🔊";
  }
};

whatsappBtn.onclick=()=>{
  box.style.display="flex";
};

createBtn.onclick = async () => {
  const number = document.getElementById("numberInput").value.trim();
  qrImage.style.display = "none";
  if(!number){
    result.innerText = "❌ اكتب رقم صحيح";
    return;
  }
  result.innerText = "⏳ جاري إنشاء الجلسة...";

  try{
    const res = await fetch(`/api/whatsapp?number=${number}`);
    const data = await res.json();

    if(data.success){
      qrImage.src = data.qr;
      qrImage.style.display = "block";
      result.innerText = `✅ امسح الكيو آر للتفعيل`;
    } else {
      result.innerText = data.message || "❌ حدث خطأ";
    }

  } catch(err){
    result.innerText = "❌ فشل الاتصال بالسيرفر";
  }
};
</script>

</body>
</html>
