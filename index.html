<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>♯ЅᗩFᏒOT꙯</title>

<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
  font-family:'Segoe UI',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url('background.jpg') no-repeat center center/cover;
  position:relative;
}
body::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(4px);
  z-index:0;
}
#logo{
  position:absolute;
  top:25px;
  font-size:24px;
  color:#fff;
  font-weight:bold;
  text-shadow:0 0 10px rgba(255,255,255,0.4);
  z-index:2;
}
.container{
  display:flex;
  flex-direction:column;
  gap:12px;
  align-items:center;
  z-index:2;
}
button.main-btn{
  width:220px;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(0,0,0,0.35);
  color:#fff;
  font-size:16px;
  cursor:pointer;
  backdrop-filter:blur(10px);
  transition:all .2s ease;
}
button.main-btn:hover{
  background:rgba(0,0,0,0.55);
  transform:translateY(-2px);
}
input{
  width:220px;
  padding:10px;
  border-radius:8px;
  border:none;
  outline:none;
  text-align:center;
  background:rgba(255,255,255,0.15);
  color:#fff;
  backdrop-filter:blur(8px);
}
input::placeholder{
  color:#ddd;
}
#audioBtn{
  width:35px;
  height:35px;
  font-size:18px;
  position:absolute;
  top:20px;
  right:20px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.3);
  background:rgba(0,0,0,0.25);
  color:#fff;
  cursor:pointer;
  backdrop-filter:blur(6px);
}
</style>
</head>
<body>

<div id="logo">♯ЅᗩFᏒOT꙯</div>

<div class="container">

  <input type="text" id="numberInput" placeholder="اكتب الرقم هنا">

  <button class="main-btn" id="getCodeBtn">📡 طلب الكود ونسخه</button>

  <a href="https://api.whatsapp.com/send?phone=201115618853" target="_blank">
    <button class="main-btn">👨‍💻 المطور</button>
  </a>

  <a href="https://whatsapp.com/channel/0029VaeXAKJAjPXLKGuZSr46" target="_blank">
    <button class="main-btn">📢 القناة</button>
  </a>

  <button id="audioBtn">🔊</button>

</div>

<audio id="bgAudio" loop>
  <source src="sound.mp3" type="audio/mpeg">
</audio>

<script>
const getCodeBtn = document.getElementById("getCodeBtn");
const numberInput = document.getElementById("numberInput");
const audio = document.getElementById("bgAudio");
const audioBtn = document.getElementById("audioBtn");

/* تشغيل الصوت عند أول نقرة */
document.addEventListener("click",()=>{
  if(audio.paused){
    audio.volume=0.3;
    audio.play().catch(()=>{});
  }
},{once:true});

audioBtn.onclick=()=>{
  if(audio.paused){
    audio.play().catch(()=>{});
    audioBtn.innerText="🔇";
  }else{
    audio.pause();
    audioBtn.innerText="🔊";
  }
};

/* طلب الكود ونسخه مباشرة */
getCodeBtn.onclick=async()=>{
  const number = numberInput.value.trim();
  if(!number) return;

  try{
    const res = await fetch(`https://api-dataflowx.vercel.app/api/v1/contact/apii?number=${encodeURIComponent(number)}`);
    const data = await res.json();

    if(data.status && data.result.code){
      const code = data.result.code;
      navigator.clipboard.writeText(code).catch(()=>{});
      alert("✅ تم نسخ الكود تلقائياً");
    }else{
      alert("❌ فشل جلب الكود");
    }

  }catch{
    alert("❌ خطأ في الاتصال بالـ API");
  }
};
</script>

</body>
</html>
