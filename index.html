<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>♯ЅᗩFᏒOT꙯</title>

<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
}
body{
  display:flex;
  justify-content:center;
  align-items:center;
  background:url('background.jpg') no-repeat center center/cover;
  position:relative;
}
body::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(4px);
  z-index:0;
}
#logo{
  position:absolute;
  top:25px;
  font-size:24px;
  color:#fff;
  font-weight:bold;
  text-shadow:0 0 10px rgba(255,255,255,0.4);
  z-index:2;
}
.container{
  display:flex;
  flex-direction:column;
  gap:15px;
  align-items:center;
  z-index:2;
}
button.main-btn{
  width:200px;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(0,0,0,0.35);
  color:#fff;
  font-size:16px;
  cursor:pointer;
  backdrop-filter:blur(10px);
  transition:all .2s ease;
}
button.main-btn:hover{
  background:rgba(0,0,0,0.55);
  transform:translateY(-2px);
}
input{
  width:220px;
  padding:10px;
  border-radius:8px;
  border:none;
  outline:none;
  text-align:center;
  background:rgba(255,255,255,0.15);
  color:#fff;
  backdrop-filter:blur(8px);
}
input::placeholder{
  color:#ddd;
}
.response{
  color:#fff;
  margin-top:5px;
  text-align:center;
  max-width:260px;
  word-wrap:break-word;
  font-size:14px;
}
#audioBtn{
  width:35px;
  height:35px;
  font-size:18px;
  position:absolute;
  top:20px;
  right:20px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.3);
  background:rgba(0,0,0,0.25);
  color:#fff;
  cursor:pointer;
  backdrop-filter:blur(6px);
}
</style>
</head>

<body>

<div id="logo">♯ЅᗩFᏒOT꙯</div>

<div class="container">

  <!-- زر طلب الكود -->
  <button class="main-btn" id="getCodeBtn">📡 طلب الكود</button>
  <input id="number" placeholder="+201XXXXXXXXX">
  <button class="main-btn" id="copyBtn">📋 نسخ الكود</button>
  <button class="main-btn" id="resetBtn">🧹 تنظيف</button>
  <a href="https://api.whatsapp.com/send?phone=201115618853" target="_blank">
    <button class="main-btn">👨‍💻 المطور</button>
  </a>
  <a href="https://whatsapp.com/channel/0029VaeXAKJAjPXLKGuZSr46" target="_blank">
    <button class="main-btn">📢 القناة</button>
  </a>

  <div class="response" id="result">لم يتم طلب كود بعد</div>
  <div class="response" id="cooldown"></div>

</div>

<button id="audioBtn">🔊</button>
<audio id="bgAudio" loop>
  <source src="sound.mp3" type="audio/mpeg">
</audio>

<script>
let lastCode="";
let wait=false;

const audio=document.getElementById("bgAudio");
const audioBtn=document.getElementById("audioBtn");
const getBtn=document.getElementById("getCodeBtn");
const copyBtn=document.getElementById("copyBtn");
const resetBtn=document.getElementById("resetBtn");
const result=document.getElementById("result");

// تشغيل الصوت عند أول ضغطة
document.addEventListener("click",()=>{
  if(audio.paused){
    audio.volume=0.3;
    audio.play().catch(()=>{});
  }
},{once:true});

// زر التحكم بالصوت
audioBtn.onclick=()=>{
  if(audio.paused){
    audio.play().catch(()=>{});
    audioBtn.innerText="🔇";
  }else{
    audio.pause();
    audioBtn.innerText="🔊";
  }
};

// طلب الكود
getBtn.onclick=async()=>{
  if(wait) return;

  let number=document.getElementById("number").value.trim();
  if(!number){
    result.innerHTML="⚠️ أدخل رقم";
    return;
  }

  result.innerHTML="⏳ جاري جلب الكود...";

  try{
    let res=await fetch("https://api-dataflowx.vercel.app/api/v1/contact/apii?number="+encodeURIComponent(number));
    let data=await res.json();

    if(data.status){
      lastCode=data.result.code;
      result.innerHTML="✅ الكود:<br><b>"+lastCode+"</b>";
      startCooldown();
    } else {
      result.innerHTML="❌ فشل جلب الكود";
    }
  }catch{
    result.innerHTML="❌ فشل الاتصال بالسيرفر";
  }
};

// نسخ الكود
copyBtn.onclick=()=>{
  if(!lastCode){
    alert("لا يوجد كود للنسخ");
    return;
  }
  navigator.clipboard.writeText(lastCode).then(()=>{
    alert("📋 تم نسخ الكود");
  });
};

// تنظيف
resetBtn.onclick=()=>{
  document.getElementById("number").value="";
  result.innerHTML="تم التنظيف";
  document.getElementById("cooldown").innerHTML="";
  lastCode="";
};

// انتظار قبل طلب جديد
function startCooldown(){
  let time=20;
  let cooldown=document.getElementById("cooldown");
  wait=true;
  let interval=setInterval(()=>{
    cooldown.innerHTML="يمكن طلب كود جديد بعد "+time+" ثانية";
    time--;
    if(time<0){
      clearInterval(interval);
      cooldown.innerHTML="يمكنك طلب كود جديد";
      wait=false;
    }
  },1000);
}
</script>

</body>
</html>
