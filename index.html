<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAFROT BOT</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:url("background.jpg") center/cover no-repeat;
}

.container{
background:rgba(0,0,0,0.6);
backdrop-filter:blur(12px);
padding:30px;
border-radius:20px;
width:90%;
max-width:420px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.8);
}

.logo{
width:90px;
border-radius:50%;
margin-bottom:10px;
box-shadow:0 0 20px #000;
}

h1{
margin:10px 0 20px 0;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-bottom:15px;
background:#111;
color:white;
text-align:center;
font-size:16px;
}

.buttons{
display:flex;
gap:8px;
}

button{
border:none;
padding:12px;
border-radius:10px;
font-size:15px;
cursor:pointer;
flex:1;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.get{
background:#3b82f6;
color:white;
}

.copy{
background:#10b981;
color:white;
}

.reset{
background:#ef4444;
color:white;
}

.extra{
margin-top:15px;
display:flex;
flex-direction:column;
gap:8px;
}

.extra button{
background:#6366f1;
color:white;
}

.result{
margin-top:20px;
background:#111;
padding:12px;
border-radius:10px;
font-size:17px;
word-wrap:break-word;
}

.loader{
margin-top:15px;
display:none;
}

.cooldown{
margin-top:10px;
font-size:14px;
color:#ccc;
}

</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>SAFROT BOT</h1>

<input id="number" placeholder="+201XXXXXXXXX">

<div class="buttons">

<button class="get" onclick="getCode()">طلب الكود</button>

<button class="copy" onclick="copyCode()">نسخ</button>

<button class="reset" onclick="resetForm()">تنظيف</button>

</div>

<div class="extra">

<button onclick="playSound()">🔊 تشغيل الصوت</button>

<button onclick="openDev()">👨‍💻 شات المطور</button>

<button onclick="openChannel()">📢 القناة</button>

</div>

<div class="loader" id="loader">
⏳ جاري جلب الكود...
</div>

<div class="result" id="result">
لم يتم طلب كود بعد
</div>

<div class="cooldown" id="cooldown"></div>

</div>

<audio id="sound">
<source src="sound.mp3" type="audio/mpeg">
</audio>

<script>

let lastCode=""
let wait=false

function playSound(){
document.getElementById("sound").play()
}

function openDev(){
window.open("https://wa.me/201115618853")
}

function openChannel(){
window.open("https://whatsapp.com/channel/0029VaeXAKJAjPXLKGuZSr46")
}

async function getCode(){

if(wait){
return
}

let number=document.getElementById("number").value
let result=document.getElementById("result")
let loader=document.getElementById("loader")

if(!number){
result.innerHTML="⚠️ أدخل رقم هاتف"
return
}

loader.style.display="block"
result.innerHTML=""

try{

let url="https://api-dataflowx.vercel.app/api/v1/contact/apii?number="+encodeURIComponent(number)

let response=await fetch(url)

let data=await response.json()

loader.style.display="none"

if(data.status){

lastCode=data.result.code

result.innerHTML="✅ الكود:<br><b>"+lastCode+"</b>"

startCooldown()

}else{

result.innerHTML="❌ فشل جلب الكود"

}

}catch(err){

loader.style.display="none"
result.innerHTML="❌ خطأ اتصال"

}

}

function copyCode(){

if(!lastCode){
alert("لا يوجد كود")
return
}

navigator.clipboard.writeText(lastCode)

alert("📋 تم نسخ الكود")

}

function resetForm(){

document.getElementById("number").value=""
document.getElementById("result").innerHTML="تم التنظيف"
document.getElementById("cooldown").innerHTML=""
lastCode=""

}

function startCooldown(){

let time=20
let cooldown=document.getElementById("cooldown")

wait=true

let interval=setInterval(()=>{

cooldown.innerHTML="يمكن طلب كود جديد بعد "+time+" ثانية"

time--

if(time<0){

clearInterval(interval)

cooldown.innerHTML="يمكنك طلب كود جديد"

wait=false

}

},1000)

}

</script>

</body>
</html>
