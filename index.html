<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم الديناميكية</title>
<style>
  body {
    font-family: sans-serif;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  .image-container {
    position: relative;
    width: 100%;
    max-width: 600px;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
  }

  .image-container img {
    width: 100%;
    display: block;
  }

  .image-container button {
    position: absolute;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.7);
    color: #fff;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
  }

  .image-container button:hover {
    transform: scale(1.2);
    background: #ff4d4d;
  }

  /* أماكن الأزرار */
  #btn1 { top: 10%; left: 10%; }
  #btn2 { top: 10%; right: 10%; }
  #btn3 { top: 40%; left: 50%; transform: translateX(-50%); }
  #btn4 { bottom: 20%; left: 20%; }
  #btn5 { bottom: 20%; right: 20%; }

  /* المودال */
  #serviceResult {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #fff;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    max-width: 90%;
    max-height: 70%;
    overflow-y: auto;
    white-space: pre-wrap;
    z-index: 1000;
  }

  #serviceResult.show {
    display: block;
  }

  #closeBtn {
    position: absolute;
    top: 10px;
    right: 15px;
    background: #ff4d4d;
    border: none;
    border-radius: 50%;
    width: 25px;
    height: 25px;
    color: #fff;
    font-weight: bold;
    cursor: pointer;
  }

  @media (max-width: 480px) {
    .image-container button {
      width: 40px;
      height: 40px;
      font-size: 12px;
    }
  }
</style>
</head>
<body>

<div class="image-container">
  <img src="background.jpg" alt="خلفية لوحة التحكم">

  <button id="btn1" data-api="/api/hello">A</button>
  <button id="btn2" data-api="/api/whatsapp">W</button>
  <button id="btn3" data-api="/api/qr">Q</button>
  <button id="btn4" data-api="/api/telegram">T</button>
  <button id="btn5" data-api="/api/vps">V</button>
</div>

<div id="serviceResult">
  <button id="closeBtn">×</button>
  <pre id="resultContent"></pre>
</div>

<script>
const resultModal = document.getElementById('serviceResult');
const resultContent = document.getElementById('resultContent');
const closeBtn = document.getElementById('closeBtn');

closeBtn.addEventListener('click', () => {
    resultModal.classList.remove('show');
});

document.querySelectorAll('.image-container button').forEach(btn => {
    btn.addEventListener('click', async () => {
        const url = btn.dataset.api;
        resultContent.textContent = 'جارٍ الاتصال... 🔄';
        resultModal.classList.add('show');

        try {
            const res = await fetch(url);
            const data = await res.json();
            resultContent.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
            resultContent.textContent = 'حدث خطأ ❌: ' + err.message;
        }
    });
});
</script>

</body>
</html>
